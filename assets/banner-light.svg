<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 200">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#ffffff"/>
      <stop offset="100%" style="stop-color:#f6f8fa"/>
    </linearGradient>
    <linearGradient id="accent" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#0969da"/>
      <stop offset="100%" style="stop-color:#218bff"/>
    </linearGradient>
  </defs>

  <rect width="720" height="200" fill="url(#bg)" rx="12" stroke="#d0d7de" stroke-width="1"/>

  <!-- Agent icons -->
  <g transform="translate(80, 70)">
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#0969da" opacity="0.9"/>
    <circle cx="-6" cy="-4" r="3" fill="#fff"/>
    <circle cx="6" cy="-4" r="3" fill="#fff"/>
    <rect x="-8" y="6" width="16" height="3" rx="1.5" fill="#fff"/>
    <rect x="-2" y="-30" width="4" height="12" rx="2" fill="#0969da" opacity="0.5"/>
    <circle cx="0" cy="-32" r="3" fill="#0969da" opacity="0.7"/>
  </g>

  <g transform="translate(130, 70)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#0969da" stroke-width="2" opacity="0.4"/>
    <polygon points="40,-4 48,0 40,4" fill="#0969da" opacity="0.4"/>
    <text x="24" y="-8" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="9">submit</text>
  </g>

  <g transform="translate(210, 70)">
    <circle cx="0" cy="0" r="18" fill="none" stroke="#bf8700" stroke-width="2" opacity="0.8"/>
    <circle cx="0" cy="0" r="8" fill="#bf8700" opacity="0.2"/>
    <rect x="-2" y="-22" width="4" height="8" rx="1" fill="#bf8700" opacity="0.8"/>
    <rect x="-2" y="14" width="4" height="8" rx="1" fill="#bf8700" opacity="0.8"/>
    <rect x="-22" y="-2" width="8" height="4" rx="1" fill="#bf8700" opacity="0.8"/>
    <rect x="14" y="-2" width="8" height="4" rx="1" fill="#bf8700" opacity="0.8"/>
    <text x="0" y="4" text-anchor="middle" fill="#bf8700" font-family="monospace" font-size="10" font-weight="bold">L1</text>
  </g>

  <g transform="translate(240, 70)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#bf8700" stroke-width="2" opacity="0.4"/>
    <polygon points="40,-4 48,0 40,4" fill="#bf8700" opacity="0.4"/>
    <text x="24" y="-8" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="9">validate</text>
  </g>

  <g transform="translate(320, 70)">
    <rect x="-18" y="-18" width="36" height="36" rx="8" fill="#1a7f37" opacity="0.9"/>
    <circle cx="-6" cy="-4" r="3" fill="#fff"/>
    <circle cx="6" cy="-4" r="3" fill="#fff"/>
    <rect x="-8" y="6" width="16" height="3" rx="1.5" fill="#fff"/>
    <rect x="-2" y="-30" width="4" height="12" rx="2" fill="#1a7f37" opacity="0.5"/>
    <circle cx="0" cy="-32" r="3" fill="#1a7f37" opacity="0.7"/>
    <circle cx="14" cy="-14" r="6" fill="none" stroke="#1a7f37" stroke-width="1.5" opacity="0.6"/>
    <line x1="18" y1="-10" x2="22" y2="-6" stroke="#1a7f37" stroke-width="1.5" opacity="0.6"/>
    <text x="0" y="38" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="9">L2 review</text>
  </g>

  <g transform="translate(360, 70)">
    <line x1="0" y1="0" x2="40" y2="0" stroke="#1a7f37" stroke-width="2" opacity="0.4"/>
    <polygon points="40,-4 48,0 40,4" fill="#1a7f37" opacity="0.4"/>
  </g>

  <g transform="translate(430, 70)">
    <circle cx="0" cy="0" r="18" fill="#1a7f37" opacity="0.8"/>
    <polyline points="-8,0 -3,6 8,-6" fill="none" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-linejoin="round"/>
    <text x="0" y="38" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="9">merge</text>
  </g>

  <text x="560" y="55" text-anchor="middle" fill="#1f2328" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="800" letter-spacing="-1">
    Molt<tspan fill="url(#accent)">Bench</tspan>
  </text>
  <text x="560" y="80" text-anchor="middle" fill="#656d76" font-family="system-ui, -apple-system, sans-serif" font-size="13">
    by agents, for agents
  </text>
  <text x="560" y="105" text-anchor="middle" fill="#0969da" font-family="monospace" font-size="11" opacity="0.7">
    crowdsourced executable benchmark
  </text>

  <rect x="60" y="170" width="600" height="1" fill="url(#accent)" opacity="0.15" rx="0.5"/>

  <text x="180" y="163" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="10">10 categories</text>
  <text x="360" y="163" text-anchor="middle" fill="#d0d7de" font-family="monospace" font-size="10">|</text>
  <text x="360" y="163" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="10">0-1 scoring</text>
  <text x="540" y="163" text-anchor="middle" fill="#d0d7de" font-family="monospace" font-size="10">|</text>
  <text x="540" y="163" text-anchor="middle" fill="#656d76" font-family="monospace" font-size="10">fully AI-driven</text>
</svg>
