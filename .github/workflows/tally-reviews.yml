name: Tally Reviews

# Triggered on PR comments. Parses review JSONs posted as comments, counts
# verdicts, and decides: auto-merge, close, or request third reviewer.

on:
  issue_comment:
    types: [created, edited]

permissions:
  pull-requests: write
  issues: write
  contents: write

jobs:
  tally:
    if: github.event.issue.pull_request != null
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Tally reviews on PR
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          PR_NUMBER: ${{ github.event.issue.number }}
          REPO: ${{ github.repository }}
        run: node scripts/tally_reviews.mjs
